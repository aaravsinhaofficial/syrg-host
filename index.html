    <script type="text/babel">
      // ============================================================================
      // SYRG Labs site app
      // ----------------------------------------------------------------------------
      // Single-file React app rendered from CDN. Hash-based SPA routing.
      // Content lives in data.js. Styling lives in styles.css.

      const { useState, useEffect, useRef } = React;

      const NAV = [
        ['home',     'Home'],
        ['research', 'Research'],
        ['team',     'Team'],
      ];

      const TAG_LABELS = {
        social:  "social science",
        physics: "physics",
        bio:     "biology",
        reports: "reports",
      };

      // Normalize a paper's tag field to an array — accepts string or array.
      const tagsOf = (p) => {
        if (!p || !p.tag) return [];
        return Array.isArray(p.tag) ? p.tag : [p.tag];
      };

      // Convert plain text to JSX, turning bare URLs into clickable links.
      // Used by news bodies so editors can paste raw URLs and have them work.
      const Linkify = ({ text }) => {
        if (!text) return null;
        const re = /https?:\/\/[^\s<>"]+/g;
        const out = [];
        let last = 0, m, i = 0;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) out.push(text.slice(last, m.index));
          let url = m[0];
          let trailing = '';
          // Trim sentence punctuation that's likely not part of the URL
          while (url.length && /[.,;:!?)\]}]/.test(url[url.length - 1])) {
            trailing = url[url.length - 1] + trailing;
            url = url.slice(0, -1);
          }
          out.push(<a key={'u' + (i++)} href={url} target="_blank" rel="noreferrer">{url}</a>);
          if (trailing) out.push(trailing);
          last = m.index + m[0].length;
        }
        if (last < text.length) out.push(text.slice(last));
        return <>{out}</>;
      };

      // ── DATA ────────────────────────────────────────────────────────────────────

      const RESEARCH_PARTNERS = D.researchPartners;
      const ACADEMIC_COLLABS  = D.academicCollaborators;
      const SPONSORS          = D.sponsors;
      const NOTEBOOKS         = D.notebooks || [];
      const NEWS              = D.news;
      const CONTACT           = D.contact;
      const HOME_AFFIL        = "Sinha-Yalageri Research Group";


      // ── ICONS ───────────────────────────────────────────────────────────────────

        linkedin:  "M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0z",
        youtube:   "M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z",
        instagram: "M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zM5.838 12a6.162 6.162 0 1 1 12.324 0 6.162 6.162 0 0 1-12.324 0zm6.162 4.162a4.162 4.162 0 1 1 0-8.324 4.162 4.162 0 0 1 0 8.324zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z",
      };

      const SocialIcon = ({ kind, href }) => (
        <a href={href} target="_blank" rel="noreferrer" aria-label={kind} title={kind}>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d={ICONS[kind.toLowerCase()]} /></svg>
        </a>
      );
      const CONTACT_ICONS = [
        ['github', 'GitHub'],
        ['linkedin', 'LinkedIn'],
        ['youtube', 'YouTube'],
        ['instagram', 'Instagram'],
      ];


      // ── HERO ANIMATION ──────────────────────────────────────────────────────────
      // Canonical PIML motif: scattered "measurements" (Dirichlet anchors)
      // pinned to fixed values, the heat equation u_t = α∇²u diffusing around
      // them so the continuous field interpolates between sparse data points.
      // Anchors slowly rotate so the reconstruction always looks alive.
      const HeroAnimation = () => {
        const canvasRef = useRef(null);
        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');

          const COLS = 120;              // wider grid for the full viewport
          const ROWS = 60;
          const ALPHA = 0.18;            // diffusion coefficient (stable < 0.25)
          const ISO = [0.16, 0.34, 0.58];
          const NUM_ANCHORS = 12;
          const ANCHOR_LIFETIME = 540;
          const HEATMAP_ALPHA = 32;      // very subtle so text reads on top

          const N = COLS * ROWS;
          let u = new Float32Array(N);
          let unext = new Float32Array(N);
          const idx = (i, j) => j * COLS + i;

          // Each anchor pins one cell to a fixed value (Dirichlet boundary).
          const newAnchor = () => ({
            i: 4 + Math.floor(Math.random() * (COLS - 8)),
            j: 3 + Math.floor(Math.random() * (ROWS - 6)),
            value: 0.4 + Math.random() * 1.0,
            age: 0,
          });

          let anchors = [];
          for (let k = 0; k < NUM_ANCHORS; k++) anchors.push(newAnchor());

          const enforceAnchors = () => {
            for (const a of anchors) u[idx(a.i, a.j)] = a.value;
          };

          // Warm-start: enforce + diffuse a bunch of times so the field opens
          // already populated rather than fading in from zero.
          enforceAnchors();
          for (let s = 0; s < 250; s++) {
            for (let j = 0; j < ROWS; j++) {
              for (let i = 0; i < COLS; i++) {
                const c = u[idx(i, j)];
                const l = i > 0        ? u[idx(i - 1, j)] : c;
                const r = i < COLS - 1 ? u[idx(i + 1, j)] : c;
                const t = j > 0        ? u[idx(i, j - 1)] : c;
                const b = j < ROWS - 1 ? u[idx(i, j + 1)] : c;
                unext[idx(i, j)] = c + ALPHA * (l + r + t + b - 4 * c);
              }
            }
            const tmp = u; u = unext; unext = tmp;
            enforceAnchors();
          }

          const step = () => {
            for (let j = 0; j < ROWS; j++) {
              for (let i = 0; i < COLS; i++) {
                const c = u[idx(i, j)];
                const l = i > 0        ? u[idx(i - 1, j)] : c;   // no-flux boundary
                const r = i < COLS - 1 ? u[idx(i + 1, j)] : c;
                const t = j > 0        ? u[idx(i, j - 1)] : c;
                const b = j < ROWS - 1 ? u[idx(i, j + 1)] : c;
                unext[idx(i, j)] = c + ALPHA * (l + r + t + b - 4 * c);
              }
            }
            const tmp = u; u = unext; unext = tmp;
            enforceAnchors();
          };

          const resize = () => {
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = canvas.clientWidth  * dpr;
            canvas.height = canvas.clientHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          };
          resize();
          window.addEventListener('resize', resize);

          // Offscreen canvas holds the field as a tiny image; we drawImage it
          // upscaled onto the visible canvas so the browser handles smoothing.
          const offscreen = document.createElement('canvas');
          offscreen.width  = COLS;
          offscreen.height = ROWS;
          const offCtx = offscreen.getContext('2d');
          const imgData = offCtx.createImageData(COLS, ROWS);

          let frame = 0, raf;

          const draw = () => {
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            const dx = w / (COLS - 1);
            const dy = h / (ROWS - 1);

            ctx.fillStyle = '#eaf4fb';
            ctx.fillRect(0, 0, w, h);

            step();

            // Slowly rotate anchors: each frame age them, replace the oldest
            // when it exceeds its lifetime so the reconstruction keeps moving.
            for (const a of anchors) a.age++;
            anchors.sort((a, b) => b.age - a.age);
            if (anchors[0].age >= ANCHOR_LIFETIME) {
              anchors[0] = newAnchor();
            }

            // Heatmap layer: a soft ink wash via offscreen canvas.
            for (let i = 0; i < N; i++) {
              const v = Math.min(1, Math.max(0, u[i]));
              const k = i * 4;
              imgData.data[k]     = 22;
              imgData.data[k + 1] = 35;
              imgData.data[k + 2] = 48;
              imgData.data[k + 3] = v * HEATMAP_ALPHA;
            }
            offCtx.putImageData(imgData, 0, 0);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(offscreen, 0, 0, w, h);

            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Marching squares per iso-value. 16 case lookup; saddles split.
            for (let k = 0; k < ISO.length; k++) {
              const iso = ISO[k];
              ctx.lineWidth = 0.7;
              ctx.strokeStyle = `rgba(22, 35, 48, ${0.10 + 0.18 * iso})`;
              ctx.beginPath();
              for (let j = 0; j < ROWS - 1; j++) {
                for (let i = 0; i < COLS - 1; i++) {
                  const v00 = u[idx(i, j)];
                  const v10 = u[idx(i + 1, j)];
                  const v11 = u[idx(i + 1, j + 1)];
                  const v01 = u[idx(i, j + 1)];

                  let c = 0;
                  if (v00 > iso) c |= 1;
                  if (v10 > iso) c |= 2;
                  if (v11 > iso) c |= 4;
                  if (v01 > iso) c |= 8;
                  if (c === 0 || c === 15) continue;

                  const x0 = i * dx;
                  const y0 = j * dy;
                  const x1 = x0 + dx;
                  const y1 = y0 + dy;

                  // Edge crossings (linear interpolation, guard against div by 0)
                  const lerp = (a, b) => Math.abs(b - a) < 1e-9 ? 0.5 : (iso - a) / (b - a);
                  const tx = x0 + dx * lerp(v00, v10);   // top edge
                  const ry = y0 + dy * lerp(v10, v11);   // right edge
                  const bx = x0 + dx * lerp(v01, v11);   // bottom edge
                  const ly = y0 + dy * lerp(v00, v01);   // left edge

                  switch (c) {
                    case 1:  ctx.moveTo(tx, y0); ctx.lineTo(x0, ly); break;
                    case 2:  ctx.moveTo(tx, y0); ctx.lineTo(x1, ry); break;
                    case 3:  ctx.moveTo(x0, ly); ctx.lineTo(x1, ry); break;
                    case 4:  ctx.moveTo(x1, ry); ctx.lineTo(bx, y1); break;
                    case 5:  ctx.moveTo(tx, y0); ctx.lineTo(x0, ly);
                             ctx.moveTo(x1, ry); ctx.lineTo(bx, y1); break;
                    case 6:  ctx.moveTo(tx, y0); ctx.lineTo(bx, y1); break;
                    case 7:  ctx.moveTo(x0, ly); ctx.lineTo(bx, y1); break;
                    case 8:  ctx.moveTo(x0, ly); ctx.lineTo(bx, y1); break;
                    case 9:  ctx.moveTo(tx, y0); ctx.lineTo(bx, y1); break;
                    case 10: ctx.moveTo(tx, y0); ctx.lineTo(x1, ry);
                             ctx.moveTo(x0, ly); ctx.lineTo(bx, y1); break;
                    case 11: ctx.moveTo(x1, ry); ctx.lineTo(bx, y1); break;
                    case 12: ctx.moveTo(x0, ly); ctx.lineTo(x1, ry); break;
                    case 13: ctx.moveTo(tx, y0); ctx.lineTo(x1, ry); break;
                    case 14: ctx.moveTo(tx, y0); ctx.lineTo(x0, ly); break;
                  }
                }
              }
              ctx.stroke();
            }

            // Anchors as small soft dots — the "data points" the field
            // interpolates between. Kept subtle so text reads on top.
            ctx.fillStyle = 'rgba(22, 35, 48, 0.30)';
            for (const a of anchors) {
              const cx = a.i * dx;
              const cy = a.j * dy;
              const r = 1.6 + Math.min(1, a.value) * 1.6;
              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.fill();
            }

            frame++;
            raf = requestAnimationFrame(draw);
          };
          draw();

          return () => {
            cancelAnimationFrame(raf);
            window.removeEventListener('resize', resize);
          };
        }, []);
        return (
          <div className="hero-anim-wrap">
            <canvas ref={canvasRef} className="hero-anim" aria-hidden="true" />
            {/* PIML signature: physics term (heat equation) + learned correction */}
            <div className="hero-anim-eqn" aria-hidden="true">
              <span className="op">∂</span><sub>t</sub>u = α<span className="op">∇</span><sup>2</sup>u + ℒ<sub>θ</sub>(u)
            </div>
          </div>
        );
      };


      // ── COMPONENTS ──────────────────────────────────────────────────────────────

      const Rail = ({ page, setPage }) => (
        <aside className="rail">
          <a className="brand" href="#" onClick={(e) => { e.preventDefault(); setPage('home'); }}>
            <img className="brand-logo" src="logos/syrg-logo.png?v=20260522-logo" alt="SYRG" />
            <span className="brand-title">Sinha-Yalageri<br/>Research Group</span>
          </a>
          <nav>
            {NAV.map(([id, label]) => (
              <button
                key={id}
                onClick={() => setPage(id)}
                aria-current={page === id ? 'page' : undefined}
              >
                {label}
              </button>
            ))}
          </nav>
          <div className="rail-foot">
            <div className="socials">
              {CONTACT_ICONS.filter(([key]) => CONTACT[key]).map(([key, label]) => (
                <SocialIcon key={key} kind={label} href={CONTACT[key]} />
              ))}
            </div>
            <div className="copy">© 2026 Sinha-Yalageri Research Group. All Rights Reserved</div>
          </div>
        </aside>
      );

      const PaperItem = ({ p, first }) => {
        const primaryHref = p.paper || p.openreview || p.code || p.notebook || '#';
        const hasLinks    = p.paper || p.openreview || p.code || p.notebook;
        const ts = tagsOf(p);
        return (
          <article className={"item" + (first ? " first" : "")}>
            <div className="item-head">
              <a className="title" href={primaryHref}>{p.title}</a>
              {ts.length > 0 && (
                <span className="tags">
                  {ts.map(t => (
                    <span key={t} className={"tag tag-" + t}>{TAG_LABELS[t] || t}</span>
                  ))}
                </span>
              )}
            </div>
            {(p.author || p.venue) && (
              <p className="byline">
                {p.author && <span>{p.author}</span>}
                {p.author && p.venue && <span className="dot"> · </span>}
                {p.venue && <span>{p.venue}</span>}
              </p>
            )}
            {p.desc && <p className="blurb">{p.desc}</p>}
            {hasLinks && (
              <div className="links">
                {p.paper    && <a href={p.paper}>[Paper]</a>}
                {p.openreview && <a href={p.openreview}>[OpenReview]</a>}
                {p.code     && <a href={p.code}>[Code]</a>}
                {p.notebook && <a href={p.notebook}>[Notebook]</a>}
              </div>
            )}
          </article>
        );
      };


      // ── PAGES ───────────────────────────────────────────────────────────────────

      const Home = ({ setPage }) => {
        const goto = (p) => (e) => { e.preventDefault(); setPage(p); };
        return (
          <>
            <h1 className="hero-title">Machine Learning for<br/>Scientific Discovery</h1>
            <p className="lede">SYRG Labs (Sinha-Yalageri Research Group) develops scientific computing methods across economics, physics, and biology to advance data-driven scientific discovery.</p>
            <h2>Current Direction</h2>
            <p className="muted">We are building toward work in computational neuroscience, connectomics, embodied neural models, and deep reinforcement learning. Publications and project artifacts will appear here as they are ready.</p>
            <p className="small" style={{ marginTop: 16 }}><a href="#team" onClick={goto('team')}>Meet the founders →</a></p>
          </>
        );
      };

      // Research has 5 sub-tabs: Selected + one per tag. Reports is just
      // another tag — entries with tag "reports" in the papers array show
      // up under the Reports tab. Same data source, same renderer.
      const Research = () => {
        const [tab, setTab] = useState('selected');
        const tabs = [
          { id: 'selected', label: 'Selected' },
          { id: 'social',   label: 'Social Science' },
          { id: 'physics',  label: 'Physics' },
          { id: 'bio',      label: 'Biology' },
          { id: 'reports',  label: 'Reports' },
        ];

        const items = tab === 'selected'
          ? SELECTED_IDS.map(id => PAPERS.find(p => p.id === id)).filter(Boolean)
          : PAPERS.filter(p => tagsOf(p).includes(tab));

        return (
          <>
            <h1>Research</h1>
            <p className="muted">Accepted papers and project artifacts from the group.</p>
            {PAPERS.length > 0 && (
              <div className="subnav">
                {tabs.map(t => (
                  <button
                    key={t.id}
                    onClick={() => setTab(t.id)}
                    aria-current={tab === t.id ? 'page' : undefined}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            )}
            {items.length === 0
              ? <p className="muted" style={{ marginTop: 24 }}>Forthcoming.</p>
              : items.map((p, i) => <PaperItem key={p.id} p={p} first={i === 0} />)}
          </>
        );
      };

      // Team page — Founding Team (LEADERSHIP) at the top, then a deduped flat list
      // of everyone else. TEAM may be either a flat array of people or grouped
      // objects with a `members` array.
      const Team = () => {
        const leadNames = new Set(LEADERSHIP.map(l => l.name));
        const seen = new Set();
        const general = [];
        for (const group of TEAM) {
          const members = Array.isArray(group.members) ? group.members : [group];
          for (const m of members) {
            if (leadNames.has(m.name) || seen.has(m.name)) continue;
            seen.add(m.name);
            general.push(m);
          }
        }

        const Name = ({ m }) => m.linkedin
          ? <a className="member-name" href={m.linkedin} target="_blank" rel="noreferrer">{m.name}</a>
          : <span className="member-name">{m.name}</span>;

        return (
          <>
            <h1>Team</h1>
            <p className="muted">The founders building the group.</p>

            <h2>Founders</h2>
            <ul className="roster">
              {LEADERSHIP.map((m, i) => (
                <li key={'lead-' + i} className="person">
                  <div className="person-head">
                    <Name m={m} />
                    <span className="aff">{m.role}</span>
                  </div>
                </li>
              ))}
            </ul>

            {general.length > 0 && (
              <>
                <h2>General Team</h2>
                <ul className="roster">
                  {general.map((m, i) => {
                    const ext = m.affiliation && m.affiliation !== HOME_AFFIL ? m.affiliation : null;
                    return (
                      <li key={'gen-' + i}>
                        <Name m={m} />
                        <span className="aff">{m.role}{ext ? ` · ${ext}` : ''}</span>
                      </li>
                    );
                  })}
                </ul>
              </>
            )}
          </>
        );
      };

      const Partners = () => {
        const PartnerCard = ({ p }) => {
          const inner = (
            <>
              <div className="logo-frame">
                {p.logo
                  ? <img src={p.logo} alt={p.name + ' logo'} />
                  : <span className={p.name === "AIYGO" ? "wordmark-aiygo" : "wordmark-text"}>{p.name}</span>}
              </div>
              <span className="partner-name">{p.name}</span>
              <span className="partner-role">{p.role}</span>
            </>
          );
          return p.url
            ? <a key={p.name} className="partner-card" href={p.url} target="_blank" rel="noreferrer">{inner}</a>
            : <div key={p.name} className="partner-card">{inner}</div>;
        };

        const renderSponsorBody = (sp, label) => {
          if (!sp)         return "—";
          if (sp.logo)     return <img className="tier-logo" src={sp.logo} alt={sp.alt || label} />;
          if (sp.name)     return <span className="wordmark-text">{sp.name}</span>;
          return "—";
        };

        return (
          <>
            <h1>Partners</h1>
            <p className="muted">We collaborate closely with research labs and are grateful for the support of our sponsors.</p>

            <h2>Research Partners</h2>
            <div>{RESEARCH_PARTNERS.map((p) => <PartnerCard key={p.name} p={p} />)}</div>

            <h2>Sponsors</h2>
            <div>
              {["platinum", "gold", "silver", "bronze"].map((t) => {
                const sp    = SPONSORS[t];
                const label = t.charAt(0).toUpperCase() + t.slice(1);
                const body  = renderSponsorBody(sp, label);
                return (
                  <div key={t} className="tier">
                    <div className="tlabel">{label}</div>
                    <div className={"tnames" + (!sp ? " tempty" : "")}>
                      {sp && sp.url
                        ? <a href={sp.url} target="_blank" rel="noreferrer">{body}</a>
                        : body}
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="muted small" style={{ marginTop: 16 }}>Further partners to be announced.</p>

            {ACADEMIC_COLLABS && ACADEMIC_COLLABS.length > 0 && (
              <p className="muted small" style={{ marginTop: 28 }}>
                <span style={{ fontWeight: 600, color: 'var(--ink)' }}>With Collaborators From: </span>
                {ACADEMIC_COLLABS.slice(0, -1).join(", ")}
                {ACADEMIC_COLLABS.length > 1 ? ", and " : ""}
                {ACADEMIC_COLLABS[ACADEMIC_COLLABS.length - 1]}.
              </p>
            )}
          </>
        );
      };

      const ModelsData = () => (
        <>
          <h1>Models &amp; Data</h1>
          <p className="muted">Interactive notebooks accompanying our research.</p>
          {NOTEBOOKS.length === 0 ? (
            <p className="muted" style={{ marginTop: 24 }}>Forthcoming.</p>
          ) : (
            <ul className="notebook-list">
              {NOTEBOOKS.map(n => (
                <li key={n.id}>
                  <a className="notebook-link"
                     href={n.url}
                     target="_blank"
                     rel="noreferrer">
                    <div>
                      <div className="notebook-title">{n.title}</div>
                      {n.desc && <div className="notebook-desc">{n.desc}</div>}
                    </div>
                    <span className="notebook-arrow">→</span>
                  </a>
                </li>
              ))}
            </ul>
          )}
        </>
      );

      const News = () => {
        const [tab, setTab] = useState('announcement');
        const tabs = [
          { id: 'announcement', label: 'Announcements' },
          { id: 'press',        label: 'Press' },
        ];
        const items = NEWS.filter(n => n.tag === tab);

        return (
          <>
            <h1>News</h1>
            <p className="muted">Partnerships, sponsors, and milestones from the group.</p>

            <div className="subnav">
              {tabs.map(t => (
                <button
                  key={t.id}
                  onClick={() => setTab(t.id)}
                  aria-current={tab === t.id ? 'page' : undefined}
                >
                  {t.label}
                </button>
              ))}
            </div>

            {items.length === 0
              ? <p className="muted" style={{ marginTop: 24 }}>Forthcoming.</p>
              : items.map((n, i) => (
                  <article key={i} className="news-item">
                    {n.image && (
                      <div className={"news-image" + (n.noBg ? " no-bg" : "")}>
                        <img src={n.image} alt="" />
                      </div>
                    )}
                    <div className="news-content">
                      <div className="news-date">{n.date}</div>
                      <h3 className="news-title">{n.title}</h3>
                      <p className="news-body"><Linkify text={n.body} /></p>
                    </div>
                  </article>
                ))}
          </>
        );
      };


      // ── APP / ROUTING ───────────────────────────────────────────────────────────
      // Hash-based SPA: #research, #team, etc. Empty hash = home.

      const pageFromHash = () => {
        const h = (window.location.hash || '').replace('#', '');
        return NAV.some(([id]) => id === h) ? h : 'home';
      };

      const PAGES = {
        home:     Home,
        research: Research,
        team:     Team,
        models:   ModelsData,
        partners: Partners,
        news:     News,
      };

      const App = () => {
        const [page, _setPage] = useState(pageFromHash());
        const setPage = (p) => {
          _setPage(p);
          window.location.hash = p === 'home' ? '' : p;
          window.scrollTo({ top: 0, behavior: 'instant' });
        };
        useEffect(() => {
          const onHash = () => _setPage(pageFromHash());
          window.addEventListener('hashchange', onHash);
          return () => window.removeEventListener('hashchange', onHash);
        }, []);

        const Page = PAGES[page] || Home;
        return (
          <div className="shell">
            <Rail page={page} setPage={setPage} />
            <main><Page setPage={setPage} /></main>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
